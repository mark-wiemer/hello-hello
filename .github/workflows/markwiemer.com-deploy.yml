# Checks daily to deploy the site
# If nothing to deploy, short-circuits
name: markwiemer.com - Daily deploy

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC

  # Allows us to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  WORKFLOW_FILE: markwiemer.com-deploy.yml

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do not cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for changes since last successful deploy
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_SHA=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/${{ env.WORKFLOW_FILE }}/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].head_sha' 2>/dev/null || echo "")

          if [ -z "$LAST_SHA" ] || [ "$LAST_SHA" = "null" ]; then
            echo "No previous successful deployment found. Deploying."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Last successful deploy: $LAST_SHA"
          echo "Current commit: ${{ github.sha }}"

          CHANGES=$(git diff --name-only "$LAST_SHA" "${{ github.sha }}" -- \
            "packages/markwiemer.com/" \
            ".github/workflows/${{ env.WORKFLOW_FILE }}" 2>/dev/null || echo "FORCE_DEPLOY")

          if [ -n "$CHANGES" ]; then
            echo "Changes detected:"
            echo "$CHANGES"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes detected. Skipping deployment."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    env:
      SITE_DIR: packages/markwiemer.com
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
        working-directory: ${{ env.SITE_DIR }}
      - name: Build static content
        run: bun run build
        working-directory: ${{ env.SITE_DIR }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "${{ env.SITE_DIR }}/dist"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
